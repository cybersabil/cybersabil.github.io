media: media

# Pages CMS entries use guarded select fields for fixed options so non-technical edits cannot create invalid mode, theme or visibility values.
content:
  # Existing Website: Site Settings
  # Purpose: Controls the original tools website brand, hero copy, main buttons, GitHub link, about text and footer.
- name: site
  label: Site Settings
  type: file
  path: data/site.json
  format: json
  fields:
  - name: brandName
    label: Brand Name
    type: string
  - name: logoText
    label: Logo Text
    type: string
  - name: badge
    label: Badge Text
    type: string
  - name: heroTitleBefore
    label: Hero Title First Line
    type: string
  - name: heroTitleHighlight
    label: Hero Highlight Text
    type: string
  - name: heroDescription
    label: Hero Description
    type: text
  - name: primaryButtonText
    label: Primary Button Text
    type: string
  - name: primaryButtonLink
    label: Primary Button Link
    type: string
  - name: secondaryButtonText
    label: Secondary Button Text
    type: string
  - name: secondaryButtonLink
    label: Secondary Button Link
    type: string
  - name: githubProfileLink
    label: GitHub Profile Link
    type: string
  - name: aboutTitle
    label: About Section Title
    type: string
  - name: aboutDescription
    label: About Description
    type: text
  - name: footerText
    label: Footer Text
    type: text

  # Existing Website: Design Settings
  # Purpose: Keeps the original website theme controls available from Pages CMS.
- name: design
  label: Design Settings
  type: file
  path: data/design.json
  format: json
  fields:
  - name: themeMode
    label: Theme Mode (dark, light, blue, green, purple)
    type: select
    options:
      values:
      - "dark"
      - "light"
      - "blue"
      - "green"
      - "purple"
  - name: accentColor
    label: Accent Color (cyan, green, blue, orange, purple)
    type: select
    options:
      values:
      - "cyan"
      - "green"
      - "blue"
      - "orange"
      - "purple"
  - name: backgroundStyle
    label: Background Style (gradient, plain, grid)
    type: select
    options:
      values:
      - "gradient"
      - "plain"
      - "grid"
  - name: cardStyle
    label: Card Style (glass, solid, border)
    type: select
    options:
      values:
      - "glass"
      - "solid"
      - "border"
  - name: heroLayout
    label: Hero Layout (split, center)
    type: select
    options:
      values:
      - "split"
      - "center"
  - name: showTerminalPreview
    label: Show Terminal Preview? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
- name: site_settings
  label: Full Mode and Website Controls
  type: file
  path: data/site-settings.json
  format: json
  fields:
  - name: version
    label: Version
    type: string
  - name: schemaVersion
    label: Runtime Schema Version (developer-managed)
    type: string
  - name: bootStatusMessage
    label: Loading Status Message
    type: string
  - name: gatewayEnabled
    label: Show Gateway Overlay? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: defaultMode
    label: Default Mode (gateway, website, portfolio)
    type: select
    options:
      values:
      - "gateway"
      - "website"
      - "portfolio"
  - name: websiteEnabled
    label: Enable Website Mode? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: portfolioEnabled
    label: Enable Portfolio Mode? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showModeSwitch
    label: Show Mode Switch? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: modeSwitchWebsiteLabel
    label: Mode Switch Website Label
    type: string
  - name: modeSwitchPortfolioLabel
    label: Mode Switch Portfolio Label
    type: string
  - name: modeSwitchPosition
    label: Mode Switch Position (top-right, bottom-right)
    type: select
    options:
      values:
      - "top-right"
      - "bottom-right"
  - name: rememberVisitorChoice
    label: Remember Visitor Choice? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: enableUrlModeOverride
    label: Enable URL Mode Override? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: allowGatewayCloseWithEscape
    label: Allow Escape Key to Close Gateway? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: escapeFallbackMode
    label: Escape Key Fallback Mode (website, portfolio)
    type: select
    options:
      values:
      - "website"
      - "portfolio"
  - name: showToolsSection
    label: Show Tools Section? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showDownloadsSection
    label: Show Downloads Section? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showProjectsSection
    label: Show Projects Section? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showSkillsSection
    label: Show Website Skills Section? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showDocsSection
    label: Show Docs Section? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showFaqSection
    label: Show FAQ Section? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showAboutSection
    label: Show About Section? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showQuickCommands
    label: Show Quick Commands Card? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: terminalReadyMessage
    label: Terminal Ready Message
    type: string
  - name: copyButtonDefaultTitle
    label: Copy Button Default Title
    type: string
  - name: copyButtonSuccessTitle
    label: Copy Button Success Title
    type: string
  - name: copyButtonErrorTitle
    label: Copy Button Error Title
    type: string
  - name: copyButtonAriaLabel
    label: Copy Button Accessibility Label
    type: string
  - name: showDataLoadWarning
    label: Show Data Load Warning? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: dataLoadWarningTitle
    label: Data Load Warning Title
    type: string
  - name: dataLoadWarningMessage
    label: Data Load Warning Message
    type: text

  # Existing Website: Section Text Controls
  # Purpose: Allows section headings, subtitles, nav labels and the download safety warning to be changed without code edits.
- name: sections
  label: Website Section Text
  type: file
  path: data/sections.json
  format: json
  fields:
  - name: navToolsLabel
    label: Navigation Tools Label
    type: string
  - name: navDownloadsLabel
    label: Navigation Downloads Label
    type: string
  - name: navProjectsLabel
    label: Navigation Projects Label
    type: string
  - name: navDocsLabel
    label: Navigation Docs Label
    type: string
  - name: toolsTitle
    label: Tools Section Title
    type: string
  - name: toolsSubtitle
    label: Tools Section Subtitle
    type: text
  - name: downloadsTitle
    label: Downloads Section Title
    type: string
  - name: downloadsSubtitle
    label: Downloads Section Subtitle
    type: text
  - name: downloadsWarning
    label: Downloads Safety Warning
    type: text
  - name: projectsTitle
    label: Projects Section Title
    type: string
  - name: projectsSubtitle
    label: Projects Section Subtitle
    type: text
  - name: skillsTitle
    label: Website Skills Section Title
    type: string
  - name: skillsSubtitle
    label: Website Skills Section Subtitle
    type: text
  - name: quickCommandsTitle
    label: Quick Commands Title
    type: string
  - name: quickCommandsSubtitle
    label: Quick Commands Subtitle
    type: text
  - name: docsTitle
    label: Docs Section Title
    type: string
  - name: docsSubtitle
    label: Docs Section Subtitle
    type: text
  - name: faqTitle
    label: FAQ Section Title
    type: string
  - name: faqSubtitle
    label: FAQ Section Subtitle
    type: text

  # SEO Settings
  # Purpose: Controls browser title, meta description, social preview text and theme color.
- name: seo
  label: SEO and Social Preview
  type: file
  path: data/seo.json
  format: json
  fields:
  - name: pageTitle
    label: Browser Page Title
    type: string
  - name: metaDescription
    label: Meta Description
    type: text
  - name: ogTitle
    label: Open Graph Title
    type: string
  - name: ogDescription
    label: Open Graph Description
    type: text
  - name: ogImage
    label: Open Graph Image URL
    type: string
  - name: canonicalUrl
    label: Canonical URL
    type: string
  - name: ogType
    label: Open Graph Type
    type: string
  - name: ogUrl
    label: Open Graph URL
    type: string
  - name: twitterCard
    label: Twitter/X Card Type
    type: select
    options:
      values:
      - "summary_large_image"
      - "summary"
  - name: twitterTitle
    label: Twitter/X Title
    type: string
  - name: twitterDescription
    label: Twitter/X Description
    type: text
  - name: twitterImage
    label: Twitter/X Image URL
    type: string
  - name: themeColor
    label: Browser Theme Color
    type: string

  # Gateway Overlay Controls
  # Purpose: Controls minimal gateway labels, optional elements, card copy, style preset and background settings from CMS.
- name: gateway
  label: Gateway Overlay
  type: file
  path: data/gateway.json
  format: json
  fields:
  - name: logoText
    label: Gateway Logo Text
    type: string
  - name: eyebrow
    label: Gateway Eyebrow Text
    type: string
  - name: showLogoRow
    label: Show Gateway Logo Row? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: title
    label: Gateway Title
    type: string
  - name: subtitle
    label: Gateway Subtitle
    type: text
  - name: showSubtitle
    label: Show Gateway Subtitle? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: choiceLabel
    label: Choice Column Label
    type: string
  - name: showChoiceLabel
    label: Show Choice Column Label? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: chipOne
    label: Highlight Chip One
    type: string
  - name: chipTwo
    label: Highlight Chip Two
    type: string
  - name: chipThree
    label: Highlight Chip Three
    type: string
  - name: showChips
    label: Show Highlight Chips? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: footerNote
    label: Gateway Footer Note
    type: text
  - name: showFooterNote
    label: Show Gateway Footer Note? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showCardIcons
    label: Show Card Icons? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showCardKickers
    label: Show Card Kicker Labels? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showCardDescriptions
    label: Show Card Descriptions? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: showCardButtons
    label: Show Card Button Labels? (yes/no)
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: websiteIcon
    label: Website Card Icon
    type: string
  - name: websiteKicker
    label: Website Card Kicker
    type: string
  - name: websiteTitle
    label: Website Card Title
    type: string
  - name: websiteDescription
    label: Website Card Description
    type: text
  - name: websiteButtonText
    label: Website Card Button Text
    type: string
  - name: portfolioIcon
    label: Portfolio Card Icon
    type: string
  - name: portfolioKicker
    label: Portfolio Card Kicker
    type: string
  - name: portfolioTitle
    label: Portfolio Card Title
    type: string
  - name: portfolioDescription
    label: Portfolio Card Description
    type: text
  - name: portfolioButtonText
    label: Portfolio Card Button Text
    type: string
  - name: stylePreset
    label: Gateway Style Preset (minimal-selector, premium-glass, solid, minimal)
    type: select
    options:
      values:
      - "minimal-selector"
      - "premium-glass"
      - "solid"
      - "minimal"
  - name: animationStyle
    label: Gateway Animation Style (soft-scale, none)
    type: select
    options:
      values:
      - "soft-scale"
      - "none"
  - name: backgroundBlur
    label: Background Blur Number
    type: number
  - name: backgroundDarkness
    label: Background Darkness Number
    type: number
  - name: panelMaxWidth
    label: Gateway Panel Max Width
    type: string

  # Global visual baseline and non-destructive reset
  # Purpose: Keeps the whole site on the exact v2.8.3 visual baseline by default. Select section-controlled only when advanced section presets should be allowed to apply.
- name: visual_baseline
  label: Global v2.8.3 Visual Baseline and Reset
  type: file
  path: data/visual-baseline.json
  format: json
  fields:
  - name: globalVisualPreset
    label: Global Visual Baseline
    type: select
    options:
      values:
      - "v2.8.3-exact"
      - "section-controlled"

  # Advanced Gateway Visual Controls
  # Purpose: Provides deep but bounded Gateway layout, position, border, background, card and animation controls without exposing raw CSS.
- name: gateway_appearance
  label: Advanced Gateway Appearance
  type: file
  path: data/gateway-appearance.json
  format: json
  fields:
  - name: advancedControlsEnabled
    label: Enable Advanced Gateway Visual Controls?
    type: select
    options:
      values:
      - "yes"
      - "no"
  - name: visualPreset
    label: Gateway Visual Baseline
    type: select
    options:
      values:
      - "v2.8.3-exact"
      - "custom-advanced"
  - name: layoutControlMode
    label: Gateway Layout and Order Controls
    type: select
    options:
      values:
      - "inherit"
      - "custom"
  - name: appearanceControlMode
    label: Gateway Appearance Controls
    type: select
    options:
      values:
      - "inherit"
      - "custom"
  - name: animationControlMode
    label: Gateway Animation Controls
    type: select
    options:
      values:
      - "inherit"
      - "custom"
  - name: interactionControlMode
    label: Gateway Hover and Click Controls
    type: select
    options:
      values:
      - "inherit"
      - "custom"
  - name: cardOrder
    label: Card Order
    type: select
    options:
      values:
      - "website-first"
      - "portfolio-first"
  - name: desktopCardLayout
    label: Desktop Card Layout
    type: select
    options:
      values:
      - "row"
      - "column"
  - name: tabletCardLayout
    label: Tablet Card Layout
    type: select
    options:
      values:
      - "row"
      - "column"
  - name: mobileCardLayout
    label: Mobile Card Layout
    type: select
    options:
      values:
      - "row"
      - "column"
  - name: desktopPanelPosition
    label: Desktop Panel Position
    type: select
    options:
      values:
      - "center"
      - "top-left"
      - "top-center"
      - "top-right"
      - "center-left"
      - "center-right"
      - "bottom-left"
      - "bottom-center"
      - "bottom-right"
  - name: tabletPanelPosition
    label: Tablet Panel Position
    type: select
    options:
      values:
      - "center"
      - "top-left"
      - "top-center"
      - "top-right"
      - "center-left"
      - "center-right"
      - "bottom-left"
      - "bottom-center"
      - "bottom-right"
