- name: system_controls
  label: 99. SYSTEM SETTINGS — Normally Do Not Change
  type: group
  items:
  - name: visual_baseline
    label: Approved site look — Do not change
    type: file
    path: data/visual-baseline.json
    format: json
    fields:
    - name: globalVisualPreset
      label: Approved overall site design — Visual preset
      type: select
      options:
        values:
        - name: v2.8.3-exact
          label: Original (Recommended)
        - name: section-controlled
          label: Use Section Settings
      description: System-controlled setting hai. Original approved behavior/design bachane ke liye isse edit na karein.
