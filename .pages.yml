media: media
content:
- name: start_here
  label: 00. START HERE — Common & Safe Controls
  type: group
  items:
  - name: site_settings
    label: ✅ Modes, Sections & Basic Switch
    type: file
    path: data/site-settings.json
    format: json
    fields:
    - name: gatewayEnabled
      label: ✅ Gateway selection screen dikhani hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes rakhen to Website/Portfolio choose karne wala Gateway khulega.
    - name: defaultMode
      label: ⚠ Site ka initial mode
      type: select
      options:
        values:
        - name: gateway
          label: Gateway selection screen
        - name: website
          label: Website
        - name: portfolio
          label: Portfolio
      description: Gateway background ke liye is field ka use na karein. Gateway dikhana ho to Gateway selection screen choose
        karein.
    - name: websiteEnabled
      label: ✅ Website mode enable rahe?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: No karne par Website option unavailable ho jayega.
    - name: portfolioEnabled
      label: ✅ Portfolio mode enable rahe?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: No karne par Portfolio option unavailable ho jayega.
    - name: showModeSwitch
      label: ✅ Website/Portfolio switch button dikhana hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Site ke andar floating mode-switch button show/hide karta hai.
    - name: modeSwitchWebsiteLabel
      label: ✅ Switch par Website ka label
      type: string
      description: Floating switch me Website side par dikhne wala text.
    - name: modeSwitchPortfolioLabel
      label: ✅ Switch par Portfolio ka label
      type: string
      description: Floating switch me Portfolio side par dikhne wala text.
    - name: modeSwitchPosition
      label: ⚠ Basic switch position (fallback)
      type: select
      options:
        values:
        - name: top-right
          label: Top right
        - name: bottom-right
          label: Bottom right
      description: Sirf tab use hota hai jab Advanced Switch Position Controls = Inherit ho.
    - name: rememberVisitorChoice
      label: ✅ Visitor ka last mode yaad rakhna hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes par user ke switch/card click ke baad browser localStorage me last mode save hoga. Existing tab me
        default-mode test ke liye Incognito ya storage clear karein.
    - name: showToolsSection
      label: ✅ Website me Tools section dikhana hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes par Website mode me Tools section visible hoga; No par hidden rahega.
    - name: showDownloadsSection
      label: ✅ Website me Downloads section dikhana hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes par Website mode me Downloads section visible hoga; No par hidden rahega.
    - name: showProjectsSection
      label: ✅ Website me Projects section dikhana hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes par Website mode me Projects section visible hoga; No par hidden rahega.
    - name: showSkillsSection
      label: ✅ Website me Skills section dikhana hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes par Website mode me Skills section visible hoga; No par hidden rahega.
    - name: showDocsSection
      label: ✅ Website me Docs section dikhana hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes par Website mode me Docs section visible hoga; No par hidden rahega.
    - name: showFaqSection
      label: ✅ Website me Faq section dikhana hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes par Website mode me Faq section visible hoga; No par hidden rahega.
    - name: showAboutSection
      label: ✅ Website me About section dikhana hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes par Website mode me About section visible hoga; No par hidden rahega.
    - name: showQuickCommands
      label: ✅ Show Quick Commands Card? (yes/no)
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes se feature visible/enabled hoga; No se hide/disable hoga.
    - name: enableUrlModeOverride
      label: ⚠ URL se mode choose karne dena hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes par page reload/open ke waqt ?mode=website, ?mode=portfolio aur ?mode=gateway read hoga. Current page
        par option change karte hi mode automatically switch nahi hota.
    - name: allowGatewayCloseWithEscape
      label: ⚠ Escape key se Gateway close ho?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Gateway visible hone par keyboard Escape action ko enable/disable karta hai. Mobile touch par iska visible
        effect nahi hai.
    - name: escapeFallbackMode
      label: ⚠ Escape ke baad kaunsa mode khule?
      type: select
      options:
        values:
        - name: website
          label: Website
        - name: portfolio
          label: Portfolio
      description: Sirf Allow Escape = Yes aur Gateway visible hone par Escape press karne ke baad selected mode khulta hai.
    - name: terminalReadyMessage
      label: ⚠ Terminal preview ka final ready message
      type: string
      description: Tools cards render hone ke baad terminal preview ki last line me dikhai deta hai. Terminal Preview hidden
        ho to visible effect nahi hoga.
    - name: copyButtonDefaultTitle
      label: ⚠ Copy button default tooltip
      type: string
      description: Command blocks ke copy button par hover/accessible title. Dynamic content render ke baad apply hota hai.
    - name: copyButtonSuccessTitle
      label: ⚠ Copy successful message
      type: string
      description: Copy button click successful hone ke baad temporary tooltip/accessible message.
    - name: copyButtonErrorTitle
      label: ⚠ Copy failed message
      type: string
      description: Clipboard copy fail hone par temporary tooltip/accessible message.
    - name: copyButtonAriaLabel
      label: ⚠ Copy button screen-reader label
      type: string
      description: Command copy buttons ka accessibility label. Visible text nahi hai.
    - name: showDataLoadWarning
      label: ⚠ JSON failure warning dikhani hai?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Normal successful load me kuch nahi dikhata. Sirf CMS JSON load/parse failure detect hone par warning control
        karta hai.
    - name: dataLoadWarningTitle
      label: ⚠ JSON failure warning title
      type: string
      description: Sirf actual data-loading failure ke waqt use hota hai; normal page par visible nahi hoga.
    - name: dataLoadWarningMessage
      label: ⚠ JSON failure warning message
      type: text
      description: Sirf actual data-loading failure ke waqt use hota hai; normal page par visible nahi hoga.
    - name: bootStatusMessage
      label: ⚠ Initial loading status message
      type: string
      description: Build-generated critical snapshot me include hota hai aur perceptible slow boot par dikh sakta hai. Save
        ke baad GitHub Action generator run hona zaroori hai.
    - name: version
      label: 🔒 Release Version
      type: string
      description: System-managed release value. Isko manually edit na karein.
      readonly: true
    - name: schemaVersion
      label: 🔒 Runtime Schema Version
      type: string
      description: Developer-managed schema value. Isko manually edit na karein.
      readonly: true
  - name: gateway
    label: ✅ Gateway Text, Cards & Background
    type: file
    path: data/gateway.json
    format: json
    fields:
    - name: backgroundMode
      label: ✅ Gateway ke peeche kya dikhana hai?
      type: select
      options:
        values:
        - name: website
          label: Website
        - name: portfolio
          label: Portfolio
      description: Portfolio choose karne par Gateway ke background me Portfolio; Website choose karne par Website. Isse card
        order change nahi hota.
    - name: title
      label: ✅ Gateway ka main title
      type: string
      description: Gateway panel ka sabse bada heading text.
    - name: subtitle
      label: ✅ Gateway subtitle
      type: text
      description: Main title ke neeche dikhne wala explanation text.
    - name: showSubtitle
      label: ✅ Show Gateway Subtitle? (yes/no)
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes se feature visible/enabled hoga; No se hide/disable hoga.
    - name: logoText
      label: Gateway Logo Text
      type: string
      description: Live site me “Gateway Logo Text” ke liye dikhne/used hone wala content.
    - name: eyebrow
      label: Gateway Eyebrow Text
      type: string
      description: Live site me “Gateway Eyebrow Text” ke liye dikhne/used hone wala content.
    - name: showLogoRow
      label: ✅ Show Gateway Logo Row? (yes/no)
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes se feature visible/enabled hoga; No se hide/disable hoga.
    - name: choiceLabel
      label: Choice Column Label
      type: string
      description: Live site me “Choice Column Label” ke liye dikhne/used hone wala content.
    - name: showChoiceLabel
      label: ✅ Show Choice Column Label? (yes/no)
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes se feature visible/enabled hoga; No se hide/disable hoga.
    - name: chipOne
      label: Highlight Chip One
      type: string
      description: Live site me “Highlight Chip One” ke liye dikhne/used hone wala content.
    - name: chipTwo
      label: Highlight Chip Two
      type: string
      description: Live site me “Highlight Chip Two” ke liye dikhne/used hone wala content.
    - name: chipThree
      label: Highlight Chip Three
      type: string
      description: Live site me “Highlight Chip Three” ke liye dikhne/used hone wala content.
    - name: showChips
      label: ✅ Show Highlight Chips? (yes/no)
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes se feature visible/enabled hoga; No se hide/disable hoga.
    - name: websiteIcon
      label: Website Card Icon
      type: string
      description: Live site me “Website Card Icon” ke liye dikhne/used hone wala content.
    - name: websiteKicker
      label: Website Card Kicker
      type: string
      description: Live site me “Website Card Kicker” ke liye dikhne/used hone wala content.
    - name: websiteTitle
      label: ✅ Website card ka title
      type: string
      description: Website mode wale card ka main title.
    - name: websiteDescription
      label: ✅ Website card ka description
      type: text
      description: Website card ke andar short explanation.
    - name: websiteButtonText
      label: ✅ Website card button text
      type: string
      description: Website card ke action/button par dikhne wala text.
    - name: portfolioIcon
      label: Portfolio Card Icon
      type: string
      description: Live site me “Portfolio Card Icon” ke liye dikhne/used hone wala content.
    - name: portfolioKicker
      label: Portfolio Card Kicker
      type: string
      description: Live site me “Portfolio Card Kicker” ke liye dikhne/used hone wala content.
    - name: portfolioTitle
      label: ✅ Portfolio card ka title
      type: string
      description: Portfolio mode wale card ka main title.
    - name: portfolioDescription
      label: ✅ Portfolio card ka description
      type: text
      description: Portfolio card ke andar short explanation.
    - name: portfolioButtonText
      label: ✅ Portfolio card button text
      type: string
      description: Portfolio card ke action/button par dikhne wala text.
    - name: showCardIcons
      label: ✅ Show Card Icons? (yes/no)
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes se feature visible/enabled hoga; No se hide/disable hoga.
    - name: showCardKickers
      label: ✅ Show Card Kicker Labels? (yes/no)
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes se feature visible/enabled hoga; No se hide/disable hoga.
    - name: showCardDescriptions
      label: ✅ Show Card Descriptions? (yes/no)
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes se feature visible/enabled hoga; No se hide/disable hoga.
    - name: showCardButtons
      label: ✅ Show Card Button Labels? (yes/no)
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes se feature visible/enabled hoga; No se hide/disable hoga.
    - name: footerNote
      label: Gateway Footer Note
      type: text
      description: Live site me “Gateway Footer Note” ke liye dikhne/used hone wala content.
    - name: showFooterNote
      label: ✅ Show Gateway Footer Note? (yes/no)
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes se feature visible/enabled hoga; No se hide/disable hoga.
    - name: stylePreset
      label: ⚠ Gateway baseline style
      type: select
      options:
        values:
        - name: minimal-selector
          label: Minimal selector
        - name: premium-glass
          label: Premium glass
        - name: solid
          label: Solid
        - name: minimal
          label: Minimal
      description: Normally as-is rakhein. Advanced Appearance = Custom hone par detailed design settings isko override kar
        sakti hain.
    - name: animationStyle
      label: ⚠ Gateway baseline animation
      type: select
      options:
        values:
        - name: soft-scale
          label: Soft scale
        - name: none
          label: None
      description: Normally as-is rakhein. Advanced Animation = Custom hone par detailed animation settings use hongi.
    - name: backgroundBlur
      label: ⚠ Baseline background blur
      type: number
      description: 'Gateway ke peeche background blur. Advanced Appearance custom ho to us group ki value priority legi. Allowed
        range: 0–18. Out-of-range value runtime me clamp hoti hai.'
      options:
        min: 0
        max: 18
    - name: backgroundDarkness
      label: ⚠ Baseline background darkness
      type: number
      description: 'Gateway overlay ki baseline darkness. Advanced Appearance custom ho to us group ki value priority legi.
        Allowed range: 0–0.9. Out-of-range value runtime me clamp hoti hai.'
      options:
        min: 0
        max: 0.9
    - name: panelMaxWidth
      label: ⚠ Basic Gateway panel width
      type: string
      description: Sirf Advanced Gateway Appearance = Inherit hone par basic width apply hoti hai. Valid value jaise 680px,
        42rem ya 80vw likhein; invalid value 680px par fallback hoti hai.
  - name: gateway_appearance
    label: ✅ Gateway Order/Layout + ⚠ Advanced Design
    type: file
    path: data/gateway-appearance.json
    format: json
    fields:
    - name: advancedControlsEnabled
      label: ⚠ Gateway advanced groups enable?
      type: select
      options:
        values:
        - name: 'yes'
          label: Yes — show / enable
        - name: 'no'
          label: No — hide / disable
      description: Yes zaroori hai. No karne par Layout, Appearance, Animation aur Interaction ke sab custom groups intentionally
        ignore honge.
    - name: visualPreset
      label: 🔒 Legacy Gateway preset
      type: select
      options:
        values:
        - name: v2.8.3-exact
          label: Original approved design (v2.8.3 exact)
        - name: custom-advanced
          label: Use grouped custom controls
      description: Backward compatibility field. Current grouped controls ke saath iska direct effect nahi hai.
      hidden: true
      readonly: true
    - name: layoutControlMode
      label: ✅ Gateway layout & card-order control
      type: select
      options:
        values:
        - name: inherit
          label: Inherit — accepted/default design use karein
        - name: custom
          label: Custom — is group ki settings use karein
      description: Card order, row/column aur panel position edit karni ho to Custom. Isse colors/animation change nahi honge.
    - name: appearanceControlMode
      label: ⚠ Gateway colors, blur & card design
      type: select
      options:
        values:
        - name: inherit
          label: Inherit — accepted/default design use karein
        - name: custom
          label: Custom — is group ki settings use karein
      description: Sirf visual design manually change karna ho to Custom; otherwise Inherit rakhein.
    - name: animationControlMode
      label: ⚠ Gateway entry animations
      type: select
      options:
        values:
        - name: inherit
          label: Inherit — accepted/default design use karein
        - name: custom
          label: Custom — is group ki settings use karein
      description: Sirf animations/timing manually change karni ho to Custom; otherwise Inherit rakhein.
    - name: interactionControlMode
      label: ⚠ Gateway hover & click effects
      type: select
      options:
        values:
        - name: inherit
          label: Inherit — accepted/default design use karein
        - name: custom
          label: Custom — is group ki settings use karein
      description: Sirf hover/click effects manually change karne ho to Custom; otherwise Inherit rakhein.
    - name: cardOrder
      label: ✅ Gateway me kaunsa card pehle?
      type: select
      options:
        values:
        - name: website-first
          label: Website card first
        - name: portfolio-first
          label: Portfolio card first
      description: Sirf card order badalta hai. Layout Controls = Custom hona chahiye.
    - name: desktopCardLayout
      label: ✅ Desktop par cards ka layout
      type: select
      options:
        values:
        - name: row
          label: Side-by-side (row)
        - name: column
          label: One below another (column)
      description: Desktop par side-by-side ya one-below-another. Layout Controls = Custom hona chahiye.
    - name: tabletCardLayout
      label: ✅ Tablet par cards ka layout
      type: select
      options:
        values:
        - name: row
          label: Side-by-side (row)
        - name: column
          label: One below another (column)
      description: Tablet portrait/landscape breakpoint par row ya column. Layout Controls = Custom hona chahiye.
    - name: mobileCardLayout
      label: ✅ Mobile par cards ka layout
      type: select
      options:
        values:
        - name: row
          label: Side-by-side (row)
        - name: column
          label: One below another (column)
      description: Mobile par row ya column. Usually column easiest hota hai.
    - name: desktopPanelPosition
      label: ✅ Desktop Gateway panel position
      type: select
      options:
        values:
        - name: center
          label: Center
        - name: top-left
          label: Top left
        - name: top-center
          label: Top center
        - name: top-right
          label: Top right
        - name: center-left
          label: Middle left
        - name: center-right
          label: Middle right
        - name: bottom-left
          label: Bottom left
        - name: bottom-center
          label: Bottom center
        - name: bottom-right
          label: Bottom right
      description: Desktop screen par Gateway panel kahan rahega. Layout Controls = Custom hona chahiye.
    - name: tabletPanelPosition
      label: ✅ Tablet Gateway panel position
      type: select
      options:
        values:
        - name: center
          label: Center
        - name: top-left
          label: Top left
        - name: top-center
          label: Top center
        - name: top-right
          label: Top right
        - name: center-left
          label: Middle left
        - name: center-right
          label: Middle right
        - name: bottom-left
          label: Bottom left
        - name: bottom-center
          label: Bottom center
        - name: bottom-right
          label: Bottom right
      description: Tablet screen par Gateway panel kahan rahega.
    - name: mobilePanelPosition
      label: ✅ Mobile Gateway panel position
      type: select
      options:
        values:
        - name: center
          label: Center
        - name: top-left
          label: Top left
        - name: top-center
          label: Top center
        - name: top-right
          label: Top right
        - name: center-left
          label: Middle left
        - name: center-right
          label: Middle right
        - name: bottom-left
          label: Bottom left
        - name: bottom-center
          label: Bottom center
        - name: bottom-right
          label: Bottom right
      description: Mobile screen par Gateway panel kahan rahega.
    - name: panelContentLayout
      label: Panel Content Layout
      type: select
      options:
        values:
        - name: stacked
          label: Stacked layout
        - name: brand-left
          label: Brand left
        - name: brand-right
          label: Brand right
      description: Sirf Layout & Order Controls = Custom hone par apply hota hai.
    - name: panelMaxWidth
      label: Panel Maximum Width (px)
      type: number
      description: 'Sirf Appearance Controls = Custom hone par apply hota hai. Sirf order change karna ho to is field ko edit
        na karein. Allowed range: 320–1400. Out-of-range value runtime me clamp hoti hai.'
      options:
        min: 320
        max: 1400
    - name: panelMaxHeightVh
      label: Panel Maximum Height (viewport %)
      type: number
      description: 'Sirf Appearance Controls = Custom hone par apply hota hai. Sirf order change karna ho to is field ko edit
        na karein. Allowed range: 50–98. Out-of-range value runtime me clamp hoti hai.'
      options:
        min: 50
        max: 98
    - name: panelPadding
      label: Panel Padding (px)
      type: number
      description: 'Sirf Appearance Controls = Custom hone par apply hota hai. Sirf order change karna ho to is field ko edit
        na karein. Allowed range: 8–72. Out-of-range value runtime me clamp hoti hai.'
      options:
        min: 8
        max: 72
    - name: panelGap
      label: Panel Internal Gap (px)
      type: number
      description: 'Sirf Appearance Controls = Custom hone par apply hota hai. Sirf order change karna ho to is field ko edit
        na karein. Allowed range: 0–64. Out-of-range value runtime me clamp hoti hai.'
      options:
        min: 0
        max: 64
    - name: panelBorderRadius
      label: Panel Corner Radius (px)
      type: number
      description: 'Sirf Appearance Controls = Custom hone par apply hota hai. Sirf order change karna ho to is field ko edit
        na karein. Allowed range: 0–64. Out-of-range value runtime me clamp hoti hai.'
      options:
        min: 0
        max: 64
    - name: panelBackgroundType
      label: Panel Background Type
      type: select
      options:
        values:
        - name: glass
          label: Glass
        - name: gradient
          label: Gradient
        - name: solid
          label: Solid
        - name: transparent
          label: Transparent
      description: Sirf Appearance Controls = Custom hone par apply hota hai. Sirf order change karna ho to is field ko edit
        na karein.
    - name: panelBackgroundColor
      label: Panel Solid/Glass Color (#RRGGBB)
      type: string
      description: Panel Background Type = Solid ya Glass par use hota hai; Gradient par gradient colors use hote hain. Appearance
        Controls = Custom hona zaroori hai.
    - name: panelBackgroundOpacity
      label: Panel Solid/Glass Opacity (0–1)
      type: number
      description: Panel Background Type = Solid ya Glass par use hota hai; Gradient par gradient opacity fields use hote
        hain. Appearance Controls = Custom hona zaroori hai.
      options:
        min: 0
        max: 1
    - name: panelGradientStartColor
      label: Panel Gradient Start Color (#RRGGBB)
      type: string
      description: Sirf Panel Background Type = Gradient par use hota hai. Appearance Controls = Custom hona zaroori hai.
    - name: panelGradientStartOpacity
      label: Panel Gradient Start Opacity (0–1)
      type: number
      description: Sirf Panel Background Type = Gradient par use hota hai. Appearance Controls = Custom hona zaroori hai.
      options:
        min: 0
        max: 1
    - name: panelGradientEndColor
