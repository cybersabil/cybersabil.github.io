media: media
content:
- name: start_here
  label: 00. START HERE — Roz ka edit (Site & Gateway)
  type: group
  items:
  - name: site_settings
    label: A. Site khulna & sections — Basic settings
    type: file
    path: data/site-settings.json
    format: json
    fields:
    - name: gatewayEnabled
      label: First choice screen — Gateway enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: 'Kaam: Enabled par visitor ko pehle Website ya Portfolio choose karne wali screen dikhegi. Disabled par choice screen skip hogi. Recommended: dono modes use karne hain to Enabled.'
    - name: defaultMode
      label: Site khulte hi pehla page — Default mode
      type: select
      options:
        values:
        - name: gateway
          label: First choice screen (Gateway)
        - name: website
          label: Website
        - name: portfolio
          label: Portfolio
      description: 'Kaam: Site open hote hi Gateway, Website ya Portfolio me se kya khulega. Note: visitor ki remembered choice ON ho to uski last choice priority le sakti hai. Recommended: Gateway.'
    - name: websiteEnabled
      label: Main website access — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Website option usable rahega. Disabled = Website option band ho jayega. Website ka data delete nahi hoga.
    - name: portfolioEnabled
      label: Portfolio access — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Portfolio option usable rahega. Disabled = Portfolio option band ho jayega. Portfolio ka data delete nahi hoga.
    - name: showModeSwitch
      label: Website/Portfolio switch — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = live site par Website ↔ Portfolio switch button dikhega. Disabled = button hide hoga; dono pages ka content delete nahi hoga.
    - name: modeSwitchWebsiteLabel
      label: Switch par Website text — Website label
      type: string
      description: 'Kaam: floating switch me Website side par dikhne wala text.'
    - name: modeSwitchPortfolioLabel
      label: Switch par Portfolio text — Portfolio label
      type: string
      description: 'Kaam: floating switch me Portfolio side par dikhne wala text.'
    - name: modeSwitchPosition
      label: Switch screen par kahan ho — Position
      type: select
      options:
        values:
        - name: top-right
          label: Top Right
        - name: bottom-right
          label: Bottom Right
      description: 'Kaam: element screen par kahan rahega ye choose karta hai. Desktop aur mobile dono check karein.'
    - name: rememberVisitorChoice
      label: Last opened page yaad rahe? — Remember choice
      type: select
      options:
        values:
        - name: 'yes'
          label: 'Yes'
        - name: 'no'
          label: 'No'
      description: Yes = browser visitor ki last Website/Portfolio choice yaad rakhega. No = har fresh visit par “pehla page” setting follow hogi. Testing ke liye Incognito sabse easy hai.
    - name: showToolsSection
      label: Website Tools section — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Website par Tools section dikhega. Disabled = section hide hoga. Uska saved content delete nahi hoga.
    - name: showDownloadsSection
      label: Website Downloads section — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Website par Downloads section dikhega. Disabled = section hide hoga. Uska saved content delete nahi hoga.
    - name: showProjectsSection
      label: Website Projects section — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Website par Projects section dikhega. Disabled = section hide hoga. Uska saved content delete nahi hoga.
    - name: showSkillsSection
      label: Website Skills section — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Website par Skills section dikhega. Disabled = section hide hoga. Uska saved content delete nahi hoga.
    - name: showDocsSection
      label: Website Docs section — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Website par Docs section dikhega. Disabled = section hide hoga. Uska saved content delete nahi hoga.
    - name: showFaqSection
      label: Website FAQ section — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Website par FAQ section dikhega. Disabled = section hide hoga. Uska saved content delete nahi hoga.
    - name: showAboutSection
      label: Website About section — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Website par About section dikhega. Disabled = section hide hoga. Uska saved content delete nahi hoga.
    - name: showQuickCommands
      label: Website Quick Commands — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Website par Quick Commands section dikhega. Disabled = section hide hoga. Uska saved content delete nahi hoga.
    - name: enableUrlModeOverride
      label: URL se direct page kholna — Mode override
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = link ke end me ?mode=website, ?mode=portfolio ya ?mode=gateway laga kar specific page khola ja sakta hai. Normal editing me existing value rehne dein.
    - name: allowGatewayCloseWithEscape
      label: Esc se Gateway band karna — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = computer keyboard par Esc dabane se choice screen band hogi. Mobile par iska use nahi hota.
    - name: escapeFallbackMode
      label: Esc ke baad ka page — Fallback mode
      type: select
      options:
        values:
        - name: website
          label: Website
        - name: portfolio
          label: Portfolio
      description: Esc dabane ke baad Website ya Portfolio me se kaunsa page khulega. Ye sirf tab chalega jab Esc close setting Enabled ho.
    - name: terminalReadyMessage
      label: Terminal preview ki last line — Ready message
      type: string
      description: 'Kaam: tools box/cards show hone ke baad terminal preview ki last line me dikhai deta hai. Terminal Preview hidden ho to site par asar nahi hoga.'
    - name: copyButtonDefaultTitle
      label: Copy se pehle tooltip — Default title
      type: string
      description: 'Kaam: command blocks ke copy button par hover/accessible title. Dynamic content show ke baad apply hota hai.'
    - name: copyButtonSuccessTitle
      label: Copy ke baad tooltip — Success title
      type: string
      description: 'Kaam: copy button click successful hone ke baad temporary tooltip/accessible message.'
    - name: copyButtonErrorTitle
      label: Copy fail tooltip — Error title
      type: string
      description: 'Kaam: clipboard copy fail hone par temporary tooltip/accessible message.'
    - name: copyButtonAriaLabel
      label: Screen reader ka copy naam — ARIA label
      type: string
      description: 'Kaam: command copy buttons ka accessibility label. Visible text nahi hai.'
    - name: showDataLoadWarning
      label: Data load warning — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: 'Enabled = editable data file load/read fail hone par visitor ko warning dikhegi. Disabled = warning hide hogi. Recommended: Enabled, taaki problem turant pata chale.'
    - name: dataLoadWarningTitle
      label: Data warning heading — Warning title
      type: string
      description: 'Kaam: live site par main heading/name ke roop mein dikhne wala text. Short aur clear rakhein.'
    - name: dataLoadWarningMessage
      label: Data warning ka poora message — Warning text
      type: text
      description: 'Kaam: sirf actual data-loading failure ke waqt use hota hai; normal page par visible nahi hoga.'
    - name: bootStatusMessage
      label: Site load hote waqt message — Boot status
      type: string
      description: 'Kaam: build-generated critical snapshot me include hota hai aur perceptible slow boot par dikh sakta hai. Save ke baad GitHub Action generator run hona zaroori hai.'
    - name: version
      label: Current site release number — Version
      type: string
      description: System/release information hai. Isse manually edit karne se actual features update nahi hote. Na badlein.
      readonly: true
    - name: schemaVersion
      label: CMS data format number — Schema version
      type: string
      description: CMS data structure ka internal version hai. Galat value se compatibility issue ho sakta hai. Na badlein.
      readonly: true
    actions:
    - name: reset-one-setting
      label: Reset one setting
      workflow: cms-reset.yml
      ref: current
      cancelable: false
      confirm:
        title: Reset selected setting?
        message: Sirf selected setting fresh approved default par jayegi. Is page ki baaki settings aur doosri files unchanged rahengi.
        button: Reset setting
      fields:
      - name: setting
        label: Kaunsi setting reset karni hai?
        type: select
        required: true
        default: gatewayEnabled
        options:
        - label: First choice screen — Gateway enabled/disabled
          value: gatewayEnabled
        - label: Site khulte hi pehla page — Default mode
          value: defaultMode
        - label: Main website access — Enabled/disabled
          value: websiteEnabled
        - label: Portfolio access — Enabled/disabled
          value: portfolioEnabled
        - label: Website/Portfolio switch — Enabled/disabled
          value: showModeSwitch
        - label: Switch par Website text — Website label
          value: modeSwitchWebsiteLabel
        - label: Switch par Portfolio text — Portfolio label
          value: modeSwitchPortfolioLabel
        - label: Switch screen par kahan ho — Position
          value: modeSwitchPosition
        - label: Last opened page yaad rahe? — Remember choice
          value: rememberVisitorChoice
        - label: Website Tools section — Enabled/disabled
          value: showToolsSection
        - label: Website Downloads section — Enabled/disabled
          value: showDownloadsSection
        - label: Website Projects section — Enabled/disabled
          value: showProjectsSection
        - label: Website Skills section — Enabled/disabled
          value: showSkillsSection
        - label: Website Docs section — Enabled/disabled
          value: showDocsSection
        - label: Website FAQ section — Enabled/disabled
          value: showFaqSection
        - label: Website About section — Enabled/disabled
          value: showAboutSection
        - label: Website Quick Commands — Enabled/disabled
          value: showQuickCommands
        - label: URL se direct page kholna — Mode override
          value: enableUrlModeOverride
        - label: Esc se Gateway band karna — Enabled/disabled
          value: allowGatewayCloseWithEscape
        - label: Esc ke baad ka page — Fallback mode
          value: escapeFallbackMode
        - label: Terminal preview ki last line — Ready message
          value: terminalReadyMessage
        - label: Copy se pehle tooltip — Default title
          value: copyButtonDefaultTitle
        - label: Copy ke baad tooltip — Success title
          value: copyButtonSuccessTitle
        - label: Copy fail tooltip — Error title
          value: copyButtonErrorTitle
        - label: Screen reader ka copy naam — ARIA label
          value: copyButtonAriaLabel
        - label: Data load warning — Enabled/disabled
          value: showDataLoadWarning
        - label: Data warning heading — Warning title
          value: dataLoadWarningTitle
        - label: Data warning ka poora message — Warning text
          value: dataLoadWarningMessage
        - label: Site load hote waqt message — Boot status
          value: bootStatusMessage
        - label: Current site release number — Version
          value: version
        - label: CMS data format number — Schema version
          value: schemaVersion
  - name: gateway
    label: B. First choice screen — Gateway content
    type: file
    path: data/gateway.json
    format: json
    fields:
    - name: backgroundMode
      label: Gateway ke peeche ka page — Background mode
      type: select
      options:
        values:
        - name: website
          label: Website
        - name: portfolio
          label: Portfolio
      description: Choice screen ke transparent background ke peeche Website ya Portfolio page dikhai dega. Isse card order ya opening page change nahi hota.
    - name: title
      label: Gateway main heading — Title
      type: string
      description: 'Kaam: choice screen (Gateway) panel ka sabse bada heading text.'
    - name: subtitle
      label: Gateway heading ke neeche text — Subtitle
      type: text
      description: 'Kaam: main title ke neeche dikhne wala explanation text.'
    - name: showSubtitle
      label: Gateway subtitle — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Explanation text active ya visible hoga. Disabled = band ya hidden hoga. Saved content/value delete nahi hoti.
    - name: logoText
      label: Gateway top logo text — Logo text
      type: string
      description: 'Kaam: live site par dikhne wala chhota text/label. Button ya menu ke liye short action words use karein.'
    - name: eyebrow
      label: Gateway heading ke upar text — Eyebrow
      type: string
      description: 'Kaam: main heading ke paas/neeche dikhne wala short supporting text. Ek line mein rakhna best hai.'
    - name: showLogoRow
      label: Gateway logo row — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = top par logo + short brand line dikhegi. Disabled = poori row hide hogi; text delete nahi hoga.
    - name: choiceLabel
      label: Option boxes ke upar instruction — Choice label
      type: string
      description: 'Kaam: live site par dikhne wala chhota text/label. Button ya menu ke liye short action words use karein.'
    - name: showChoiceLabel
      label: Gateway choice instruction — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = dono option boxes ke upar instruction line dikhegi. Disabled = line hide hogi.
    - name: chipOne
      label: Gateway highlight tag 1 — Chip 1
      type: string
      description: 'Kaam: choice screen (Gateway) ke top highlight chip par dikhne wala short text. 1–3 words best rahenge.'
    - name: chipTwo
      label: Gateway highlight tag 2 — Chip 2
      type: string
      description: 'Kaam: choice screen (Gateway) ke top highlight chip par dikhne wala short text. 1–3 words best rahenge.'
    - name: chipThree
      label: Gateway highlight tag 3 — Chip 3
      type: string
      description: 'Kaam: choice screen (Gateway) ke top highlight chip par dikhne wala short text. 1–3 words best rahenge.'
    - name: showChips
      label: Gateway highlight tags — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = teen chhote highlight tags dikhenge. Disabled = tags hide honge. Blank tag ko short rakhein.
    - name: websiteIcon
      label: Website option box icon — Icon
      type: string
      description: 'Kaam: emoji ya short icon text. Blank chhodne par icon hide ho sakta hai; existing format follow karein.'
    - name: websiteKicker
      label: Website box ki chhoti top line — Kicker
      type: string
      description: 'Kaam: live site me “Website Card Kicker” ke liye dikhne/used hone wala content.'
    - name: websiteTitle
      label: Website option box heading — Title
      type: string
      description: 'Kaam: website mode wale box/card ka main title.'
    - name: websiteDescription
      label: Website option box details — Description
      type: text
      description: 'Kaam: website box/card ke andar short explanation.'
    - name: websiteButtonText
      label: Website option button text — Button label
      type: string
      description: 'Kaam: website box/card ke action/button par dikhne wala text.'
    - name: portfolioIcon
      label: Portfolio option box icon — Icon
      type: string
      description: 'Kaam: emoji ya short icon text. Blank chhodne par icon hide ho sakta hai; existing format follow karein.'
    - name: portfolioKicker
      label: Portfolio box ki chhoti top line — Kicker
      type: string
      description: 'Kaam: live site me “Portfolio Card Kicker” ke liye dikhne/used hone wala content.'
    - name: portfolioTitle
      label: Portfolio option box heading — Title
      type: string
      description: 'Kaam: portfolio mode wale box/card ka main title.'
    - name: portfolioDescription
      label: Portfolio option box details — Description
      type: text
      description: 'Kaam: portfolio box/card ke andar short explanation.'
    - name: portfolioButtonText
      label: Portfolio option button text — Button label
      type: string
      description: 'Kaam: portfolio box/card ke action/button par dikhne wala text.'
    - name: showCardIcons
      label: Dono option box icons — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Website aur Portfolio option boxes me icon/emoji dikhega. Disabled = icons hide honge.
    - name: showCardKickers
      label: Dono boxes ki top lines — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = dono boxes me title ke upar chhoti top line dikhegi. Disabled = ye lines hide hongi.
    - name: showCardDescriptions
      label: Dono option box details — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = dono option boxes ka explanation dikhega. Disabled = explanation hide hogi.
    - name: showCardButtons
      label: Dono option box buttons — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = “Open Website / View Portfolio” buttons dikhenge. Disabled = poora box phir bhi clickable reh sakta hai; publish se pehle test karein.
    - name: footerNote
      label: Gateway ke neeche note — Footer note
      type: text
      description: 'Kaam: live site me “choice screen (Gateway) Footer Note” ke liye dikhne/used hone wala content.'
    - name: showFooterNote
      label: Gateway footer note — Enabled/disabled
      type: select
      options:
        values:
        - name: 'yes'
          label: Enabled
        - name: 'no'
          label: Disabled
      description: Enabled = Neeche wala note active ya visible hoga. Disabled = band ya hidden hoga. Saved content/value delete nahi hoti.
    - name: stylePreset
      label: Gateway ready-made design — Style preset
      type: select
      options:
        values:
        - name: minimal-selector
          label: Minimal Selector
        - name: premium-glass
          label: Premium Glass
        - name: solid
          label: Solid
        - name: minimal
          label: Minimal
      description: 'Ready-made basic design choose karta hai. Recommended: current approved option. Detailed custom design sirf Advanced Design group se badlein.'
    - name: animationStyle
      label: Gateway khulne ka effect — Animation style
      type: select
      options:
        values:
        - name: soft-scale
          label: Soft Zoom
        - name: none
          label: None (Disabled)
      description: Choice screen khulte waqt basic effect. “Koi effect nahi” fastest hai; current soft effect safe hai.
    - name: backgroundBlur
      label: Gateway background blur — Blur (px)
      type: number
      description: '0 = peeche ka page clear. Number badhega to page zyada dhundhla hoga. Safe range: 0–18 px. Chhota change karke preview dekhein.'
      options:
        min: 0
        max: 18
    - name: backgroundDarkness
      label: Gateway background darkness — Darkness
      type: number
      description: 0 = dark layer nahi; 0.9 = bahut dark. Current 0.5 balanced hai. Chhota change karein.
      options:
        min: 0
        max: 0.9
    - name: panelMaxWidth
      label: Gateway main box width — Max width
      type: string
      description: 'Choice screen ke main box ki maximum width. Example: 680px. Bahut badi value mobile layout ko affect kar sakti hai.'
    actions:
    - name: reset-one-setting
      label: Reset one setting
      workflow: cms-reset.yml
      ref: current
      cancelable: false
      confirm:
        title: Reset selected setting?
        message: Sirf selected setting fresh approved default par jayegi. Is page ki baaki settings aur doosri files unchanged rahengi.
        button: Reset setting
      fields:
      - name: setting
        label: Kaunsi setting reset karni hai?
        type: select
        required: true
        default: backgroundMode
        options:
        - label: Gateway ke peeche ka page — Background mode
          value: backgroundMode
        - label: Gateway main heading — Title
          value: title
        - label: Gateway heading ke neeche text — Subtitle
          value: subtitle
        - label: Gateway subtitle — Enabled/disabled
          value: showSubtitle
        - label: Gateway top logo text — Logo text
          value: logoText
        - label: Gateway heading ke upar text — Eyebrow
          value: eyebrow
        - label: Gateway logo row — Enabled/disabled
          value: showLogoRow
        - label: Option boxes ke upar instruction — Choice label
          value: choiceLabel
        - label: Gateway choice instruction — Enabled/disabled
          value: showChoiceLabel
        - label: Gateway highlight tag 1 — Chip 1
          value: chipOne
        - label: Gateway highlight tag 2 — Chip 2
          value: chipTwo
        - label: Gateway highlight tag 3 — Chip 3
          value: chipThree
        - label: Gateway highlight tags — Enabled/disabled
          value: showChips
        - label: Website option box icon — Icon
          value: websiteIcon
        - label: Website box ki chhoti top line — Kicker
          value: websiteKicker
        - label: Website option box heading — Title
          value: websiteTitle
        - label: Website option box details — Description
          value: websiteDescription
        - label: Website option button text — Button label
          value: websiteButtonText
        - label: Portfolio option box icon — Icon
          value: portfolioIcon
        - label: Portfolio box ki chhoti top line — Kicker
          value: portfolioKicker
        - label: Portfolio option box heading — Title
          value: portfolioTitle
        - label: Portfolio option box details — Description
          value: portfolioDescription
        - label: Portfolio option button text — Button label
          value: portfolioButtonText
        - label: Dono option box icons — Enabled/disabled
          value: showCardIcons
        - label: Dono boxes ki top lines — Enabled/disabled
          value: showCardKickers
        - label: Dono option box details — Enabled/disabled
          value: showCardDescriptions
        - label: Dono option box buttons — Enabled/disabled
          value: showCardButtons
        - label: Gateway ke neeche note — Footer note
          value: footerNote
        - label: Gateway footer note — Enabled/disabled
          value: showFooterNote
        - label: Gateway ready-made design — Style preset
          value: stylePreset
        - label: Gateway khulne ka effect — Animation style
          value: animationStyle
        - label: Gateway background blur — Blur (px)
          value: backgroundBlur
        - label: Gateway background darkness — Darkness
          value: backgroundDarkness
        - label: Gateway main box width — Max width
          value: panelMaxWidth
- name: website_content
  label: 01. WEBSITE EDIT — Text, Cards & Sections
  type: group
  items:
  - name: site
    label: A. Website top area — Brand & hero
    type: file
    path: data/site.json
    format: json
    fields:
    - name: brandName
      label: Website ka naam — Brand name
      type: string
      description: 'Kaam: live site par main heading/name ke roop mein dikhne wala text. Short aur clear rakhein.'
    - name: logoText
      label: Website top logo text — Logo text
      type: string
      description: 'Kaam: live site par dikhne wala chhota text/label. Button ya menu ke liye short action words use karein.'
    - name: badge
      label: Top intro ki chhoti tag line — Hero badge
      type: string
      description: 'Kaam: main heading ke paas/neeche dikhne wala short supporting text. Ek line mein rakhna best hai.'
    - name: heroTitleBefore
      label: Top intro heading normal text — Hero title
      type: string
      description: 'Kaam: live site me “top intro (Hero) Title First Line” ke liye dikhne/used hone wala content.'
    - name: heroTitleHighlight
      label: Top intro heading colored text — Hero highlight
      type: string
      description: 'Kaam: live site me “top intro (Hero) Highlight Text” ke liye dikhne/used hone wala content.'
    - name: heroDescription
      label: Top intro heading ke neeche details — Hero description
      type: text
      description: 'Kaam: visitor ko samjhane wala text. Simple language, short paragraphs aur unnecessary technical jargon se bachein.'
    - name: primaryButtonText
      label: Top intro first button text — Primary button
      type: string
      description: 'Kaam: live site par dikhne wala chhota text/label. Button ya menu ke liye short action words use karein.'
    - name: primaryButtonLink
      label: Top intro first button URL — Primary link
      type: string
      description: 'Kaam: #section ya relative path = same tab; https:// = new tab; mailto:/tel: allowed; unsafe javascript:/data:/vbscript: blocked. Text ya link blank ho to button hide hoga.'
    - name: secondaryButtonText
      label: Top intro second button text — Secondary button
      type: string
      description: 'Kaam: live site par dikhne wala chhota text/label. Button ya menu ke liye short action words use karein.'
    - name: secondaryButtonLink
      label: Top intro second button URL — Secondary link
      type: string
