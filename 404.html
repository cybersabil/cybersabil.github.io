<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex">
    <title>Page not found • CyberSabil</title>
    <!-- CyberSabil 404 Page
         Purpose: Gives visitors a branded fallback if an old or mistyped GitHub Pages link is opened. -->
    <link rel="stylesheet" href="/assets/css/style.css?v=04758db15cd00eca9add">
</head>
<body class="theme-dark bg-gradient card-glass">
    <main class="container hero hero-center" style="min-height:100vh;align-content:center;">
        <section class="card" aria-label="Page not found">
            <div class="badge">404 • Page not found</div>
            <h1><span>CyberSabil link</span><br><span class="grad">not found.</span></h1>
            <p class="lead">The page you opened does not exist or the link has changed. Use the buttons below to return to the CyberSabil homepage.</p>
            <div class="actions">
                <a class="btn primary" href="/">Open Homepage</a>
                <a class="btn secondary" href="/?mode=website#tools">Open Tools</a>
                <a class="btn secondary" href="/?mode=portfolio">Open Portfolio</a>
            </div>
        </section>
    </main>
</body>
</html>
