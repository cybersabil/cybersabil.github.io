          - "gateway-appearance.cardHoverPreset \u2014 Advanced \u2014 cardHoverPreset"
          - "gateway-appearance.cardHoverStrength \u2014 Advanced \u2014 cardHoverStrength"
          - "gateway-appearance.cardHoverDurationMs \u2014 Advanced \u2014 cardHoverDurationMs"
          - "gateway-appearance.cardClickPreset \u2014 Advanced \u2014 cardClickPreset"
      confirmation:
        description: Type RESET to confirm
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: gateway-reset-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation and branch
        shell: bash
        run: |
          test "${{ github.event.inputs.confirmation }}" = "RESET" || { echo "Confirmation must be RESET"; exit 1; }
          test "${{ github.ref_name }}" = "main" || { echo "Run this workflow from main"; exit 1; }
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Record starting revision
        run: echo "START_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Apply selected reset
        run: node tools/gateway-reset.js "${{ github.event.inputs.target }}"
      - name: Validate generated site
        run: |
          node tools/generate-site.js
          node tools/test-config-isolation.js
          node tools/test-cms-field-coverage.js
          node tools/validate-site.js
      - name: Refuse stale reset
        shell: bash
        run: |
          git fetch origin main
          LATEST_SHA="$(git rev-parse origin/main)"
          test "$START_SHA" = "$LATEST_SHA" || { echo "Repository changed while reset was running. Run reset again."; exit 1; }
      - name: Commit reset
        shell: bash
        run: |
          if git diff --quiet; then echo "Selected value is already at default."; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data index.html 404.html
          git commit -m "CMS reset: ${{ github.event.inputs.target }}"
          git push origin HEAD:main
