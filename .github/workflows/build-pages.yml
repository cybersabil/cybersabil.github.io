name: Build and Deploy CyberSabil

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate synchronized static output
        run: node tools/generate-site.js

      - name: Test CMS control isolation
        run: node tools/test-config-isolation.js

      - name: Validate every Pages CMS field and collision guard
        run: node tools/test-cms-field-coverage.js

      - name: Validate generated site
        run: node tools/validate-site.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload generated Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
